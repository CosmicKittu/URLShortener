services:
  mongodb:
    image: mongo:7
    container_name: url-shortener-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - url-shortener-network

  redis:
    image: redis:7
    container_name: url-shortener-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - url-shortener-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: url-shortener-backend
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/urlshortener
      REDIS_URL: redis://redis:6379
      BASE_URL: http://localhost:5000
      JWT_SECRET: some_super_secret_key
      JWT_EXPIRES_IN: 7d
    depends_on:
      - mongodb
      - redis
    networks:
      - url-shortener-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: url-shortener-frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - url-shortener-network

volumes:
  mongodb_data:
  redis_data:

networks:
  url-shortener-network:
    driver: bridge